version: "3.9"

# ─────────────────────────────────────────────────────────────
# FightMind AI — Java Backend Local Dev Services
# Starts PostgreSQL (port 5432) and Redis (port 6379)
# Usage:
#   docker-compose up -d          starts both services
#   docker-compose down -v        stops and deletes volumes
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fightmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fightmind
      POSTGRES_USER:     ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-admin} -d fightmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fightmind-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
